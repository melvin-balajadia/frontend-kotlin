# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name whdocr.royalecoldstorage.com.ph;
    return 301 https://$host$request_uri;
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name whdocr.royalecoldstorage.com.ph;

    # ─── SSL Certificates (bind-mounted from host) ────────────────────────────
    ssl_certificate         /etc/nginx/certs/server.crt;
    ssl_certificate_key     /etc/nginx/certs/cert.key;
    ssl_trusted_certificate /etc/nginx/certs/inter.crt;

    # ─── SSL Hardening ────────────────────────────────────────────────────────
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     10m;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ─── Static Frontend (Vite/React) ─────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ─── Cache Static Assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;                    # don't log static asset requests
    }

    # ─── Proxy API to Node Server ─────────────────────────────────────────────
    location /api/ {
        proxy_pass              https://server:8088;
        proxy_http_version      1.1;                  # required for keep-alive
        proxy_ssl_verify        off;                  # internal traffic — self-signed cert
        proxy_set_header        Upgrade             $http_upgrade;
        proxy_set_header        Connection          'upgrade';
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_cache_bypass      $http_upgrade;

        # ─── Timeouts ─────────────────────────────────────────────────────────
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # ─── Health Check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass          https://server:8088/health;
        proxy_ssl_verify    off;
        proxy_set_header    Host $host;
        access_log          off;           # don't pollute logs with health pings
    }
}
# ─── HTTP only (no SSL — nginx sits behind your host's reverse proxy or exposes port 1003) ──
server {
    listen 80;
    server_name whdocr.royalecoldstorage.com.ph;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ─── Static Frontend (Vite/React) ─────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache Static Assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Proxy API to backend_api container ───────────────────────────────────
    location /api/ {
        proxy_pass              https://backend_api:2009;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        'upgrade';
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_cache_bypass      $http_upgrade;

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # ─── Health Check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass       https://backend_api:2009/health;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        access_log       off;
    }
}